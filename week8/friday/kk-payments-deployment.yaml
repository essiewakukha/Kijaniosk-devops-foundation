apiVersion: apps/v1
kind: Deployment
metadata:
  name: kk-payments
  namespace: default
  labels:
    app: kk-payments
    project: kijanikiosk
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kk-payments
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: kk-payments
        project: kijanikiosk
    spec:
      imagePullSecrets:
        - name: kijani-registry-credentials
      containers:
        - name: kk-payments
          image: estherwakukha/kk-payments:1.0.0-c6d7386
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
