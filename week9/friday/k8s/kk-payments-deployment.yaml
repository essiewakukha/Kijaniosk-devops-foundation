apiVersion: apps/v1
kind: Deployment
metadata:
  name: kk-payments
  namespace: kijani-project
  labels:
    app: kk-payments
    project: kijanikiosk
  annotations:
    kubernetes.io/change-cause: "Initial production-approaching deployment: v1.1.0"
spec:
  replicas: 3
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: kk-payments
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: kk-payments
        project: kijanikiosk
        version: "v1.1.0"
    spec:
      imagePullSecrets:
        - name: kijani-registry-credentials
      containers:
        - name: kk-payments
          image: estherwakukha/kk-payments:1.0.0-c6d7386
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: kk-payments-config
            - secretRef:
                name: kk-payments-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

